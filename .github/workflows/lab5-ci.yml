name: Lab 5 CI

on:
  push:
    branches: [main, master]
    paths:
      - "lab_5/**"
      - ".github/workflows/lab5-ci.yml"
  pull_request:
    paths:
      - "lab_5/**"
      - ".github/workflows/lab5-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  LAB5_DIR: lab_5

jobs:
  test:
    name: Тесты
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.LAB5_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -m compileall -q backend/app

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend
        run: node --check frontend/public/app.js

  build-and-push:
    name: Сборка и push в GHCR
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Имена образов
        id: img
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "backend=${REGISTRY}/${owner_lc}/${repo_lc}-lab5-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${owner_lc}/${repo_lc}-lab5-frontend" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.LAB5_DIR }}/backend
          push: true
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ github.sha }}

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.LAB5_DIR }}/frontend
          push: true
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}
