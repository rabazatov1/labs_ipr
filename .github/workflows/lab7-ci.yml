name: Lab 7 CI

on:
  push:
    branches: [main, master]
    paths:
      - "lab_7/**"
      - ".github/workflows/lab7-ci.yml"
  pull_request:
    paths:
      - "lab_7/**"
      - ".github/workflows/lab7-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  LAB7_DIR: lab_7

jobs:
  test:
    name: Проверки
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend
        working-directory: ${{ env.LAB7_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt
          python -m compileall -q app/backend/app
          cd app/backend && PYTHONPATH=app python -c "from fastapi.testclient import TestClient; from app.main import app; c=TestClient(app); assert c.get('/health').status_code==200; r=c.get('/metrics'); assert r.status_code==200 and b'http_requests_total' in r.content"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend
        working-directory: ${{ env.LAB7_DIR }}
        run: node --check app/frontend/public/app.js

      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Kustomize
        working-directory: ${{ env.LAB7_DIR }}
        run: |
          kubectl kustomize app/k8s/kustomization/overlays/dev > /dev/null
          kubectl kustomize app/k8s/kustomization/overlays/prod > /dev/null
          kubectl kustomize observability/k8s > /dev/null

      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"

      - name: Helm
        working-directory: ${{ env.LAB7_DIR }}
        run: |
          helm template t ./app/k8s/helm/lab7-web-app -f ./app/k8s/helm/lab7-web-app/values-dev.yaml > /dev/null
          helm template t ./app/k8s/helm/lab7-web-app -f ./app/k8s/helm/lab7-web-app/values-prod.yaml > /dev/null

  build-and-push:
    name: Сборка и push в GHCR
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Имена образов
        id: img
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "backend=${REGISTRY}/${owner_lc}/${repo_lc}-lab7-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${owner_lc}/${repo_lc}-lab7-frontend" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.LAB7_DIR }}/app/backend
          push: true
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ github.sha }}

      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.LAB7_DIR }}/app/frontend
          push: true
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}
