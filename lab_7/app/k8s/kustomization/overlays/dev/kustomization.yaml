apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lab7-demo

resources:
  - ../../base
  - namespace.yaml
  - secret.yaml
  - servicemonitor.yaml

patches:
  - path: patch-backend.yaml
  - path: patch-frontend.yaml
  - path: patch-services.yaml
  - path: patch-configmap.yaml

labels:
  - includeSelectors: true
    pairs:
      environment: dev
