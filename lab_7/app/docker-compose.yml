name: lab7-app

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lab7_app
      POSTGRES_USER: lab7_user
      POSTGRES_PASSWORD: lab7-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab7_user -d lab7_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  lab7-backend:
    build:
      context: ./backend
    environment:
      APP_ENV: разработка
      APP_VERSION: 3.0.0
      DEMO_API_KEY: lab7-demo-key
      DATABASE_URL: postgres://lab7_user:lab7-password@postgres:5432/lab7_app?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: lab7-backend
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  lab7-frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      lab7-backend:
        condition: service_healthy

volumes:
  postgres-data:
